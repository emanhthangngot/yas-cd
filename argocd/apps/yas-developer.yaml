apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-developer
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:tzin1401/yas-cd.git
    targetRevision: main
    path: overlays/developer
  destination:
    server: https://kubernetes.default.svc
    namespace: developer
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
