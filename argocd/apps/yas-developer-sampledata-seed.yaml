apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-developer-sampledata-seed
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:emanhthangngot/yas-cd.git
    targetRevision: main
    path: operations/sampledata-seed/developer
  destination:
    server: https://kubernetes.default.svc
    namespace: developer
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - Prune=false
