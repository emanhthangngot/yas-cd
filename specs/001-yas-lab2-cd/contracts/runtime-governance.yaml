runtime_governance:
  platform:
    namespace_mode: always_on
    required_apps:
      - postgres
      - redis
      - kafka
      - elasticsearch
      - keycloak
      - argocd
    readiness_required_before_apps: true
    service_endpoints:
      postgres: postgresql.postgres.svc.cluster.local:5432
      redis: redis-master.redis.svc.cluster.local:6379
      kafka: kafka-cluster-kafka-brokers.kafka.svc.cluster.local:9092
      elasticsearch: elasticsearch-es-http.elasticsearch.svc.cluster.local:9200
      keycloak: identity.keycloak.svc.cluster.local:80
      identity_dev_alias: identity.dev.svc.cluster.local:80
      identity_staging_alias: identity.staging.svc.cluster.local:80

  full_stack_environments:
    active_limit: 2
    default_active:
      - dev
      - staging
    optional_environments:
      - developer
    dormant_behavior:
      app_deployments_replicas: 0
      namespaces_retained: true
      argocd_management_retained: true

  chart_defaults:
    backend:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    ui:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
    istio_proxy:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi

  sidecar_policy:
    required_namespaces:
      - dev
      - staging
    target_ready_count: "2/2"
    required_container: istio-proxy
    developer_default: dormant
    exception_policy: explicit_documented_approval_only

  namespace_guardrails:
    required:
      - LimitRange
    optional:
      - ResourceQuota

  secret_policy:
    committed_form: sealed-secret
    plaintext_real_secrets_allowed_in_git: false
    manual_cluster_bootstrap_allowed_for_admin_only: true

  access_policy:
    app_entrypoint:
      mode: ingress-nodeport
      ports:
        - 30080
        - 30081
    admin_surfaces_public: false
