# Values LIVE của release `prometheus` (kube-prometheus-stack 87.10.1).
# Grafana dùng sqlite3 (fix đã dò — postgres/SSL gãy). Đã bỏ các key postgres thừa
# (host/name/password/user/ssl_mode) vì sqlite3 không dùng — cũng để qua secret-scan CI.
grafana:
  adminUser: admin
  adminPassword: admin
  assertNoLeakedSecrets: false
  grafana.ini:
    database:
      type: sqlite3
    # Cho phép xem CÔNG KHAI (chỉ Viewer — không sửa/không cần login).
    # Admin vẫn login riêng qua /login.
    auth.anonymous:
      enabled: true
      org_role: Viewer
      hide_version: true
  ingress:
    enabled: true
    hosts:
      - grafana.34.124.212.254.nip.io
    ingressClassName: nginx
hostname: grafana.34.124.212.254.nip.io
prometheus:
  prometheusSpec:
    enableRemoteWriteReceiver: true
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
