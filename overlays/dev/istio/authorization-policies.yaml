# cart: bff + order gọi vào (code: order→cart)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-cart-callers
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cart
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - cluster.local/ns/dev/sa/backoffice-bff
        - cluster.local/ns/dev/sa/storefront-bff
        - cluster.local/ns/dev/sa/nginx-api-gateway
        - cluster.local/ns/dev/sa/order
---
