apiVersion: v1
kind: ConfigMap
metadata:
  name: retry-proof-ok-nginx
  namespace: mesh-demo
data:
  default.conf: |
    server {
      listen 8080;
      location / {
        add_header Content-Type text/plain;
        return 200 "retry-ok\n";
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: retry-proof-fail-nginx
  namespace: mesh-demo
data:
  default.conf: |
    server {
      listen 8080;
      location / {
        add_header Content-Type text/plain;
        return 503 "retry-fail\n";
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retry-proof-ok
  namespace: mesh-demo
  labels:
    app.kubernetes.io/name: retry-proof-ok
    app.kubernetes.io/part-of: yas-mesh-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: retry-proof-ok
  template:
    metadata:
      labels:
        app.kubernetes.io/name: retry-proof-ok
        app.kubernetes.io/part-of: yas-mesh-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: retry-proof-ok-nginx
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retry-proof-fail
  namespace: mesh-demo
  labels:
    app.kubernetes.io/name: retry-proof-fail
    app.kubernetes.io/part-of: yas-mesh-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: retry-proof-fail
  template:
    metadata:
      labels:
        app.kubernetes.io/name: retry-proof-fail
        app.kubernetes.io/part-of: yas-mesh-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: retry-proof-fail-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: retry-proof-ok
  namespace: mesh-demo
  labels:
    app.kubernetes.io/name: retry-proof-ok
    app.kubernetes.io/part-of: yas-mesh-demo
spec:
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    app.kubernetes.io/name: retry-proof-ok
---
apiVersion: v1
kind: Service
metadata:
  name: retry-proof-fail
  namespace: mesh-demo
  labels:
    app.kubernetes.io/name: retry-proof-fail
    app.kubernetes.io/part-of: yas-mesh-demo
spec:
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    app.kubernetes.io/name: retry-proof-fail
---
apiVersion: v1
kind: Service
metadata:
  name: retry-proof-direct
  namespace: mesh-demo
  labels:
    app.kubernetes.io/name: retry-proof-direct
    app.kubernetes.io/part-of: yas-mesh-demo
spec:
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    app.kubernetes.io/name: retry-proof-ok
---
apiVersion: v1
kind: Service
metadata:
  name: retry-proof
  namespace: mesh-demo
  labels:
    app.kubernetes.io/name: retry-proof
    app.kubernetes.io/part-of: yas-mesh-demo
spec:
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    app.kubernetes.io/name: retry-proof-ok
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: retry-proof-direct
  namespace: mesh-demo
spec:
  hosts:
    - retry-proof-direct
    - retry-proof-direct.mesh-demo.svc.cluster.local
  http:
    - route:
        - destination:
            host: retry-proof-ok.mesh-demo.svc.cluster.local
            port:
              number: 80
          weight: 50
        - destination:
            host: retry-proof-fail.mesh-demo.svc.cluster.local
            port:
              number: 80
          weight: 50
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: retry-proof
  namespace: mesh-demo
spec:
  hosts:
    - retry-proof
    - retry-proof.mesh-demo.svc.cluster.local
  http:
    - route:
        - destination:
            host: retry-proof-ok.mesh-demo.svc.cluster.local
            port:
              number: 80
          weight: 50
        - destination:
            host: retry-proof-fail.mesh-demo.svc.cluster.local
            port:
              number: 80
          weight: 50
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: "5xx,connect-failure,refused-stream"
