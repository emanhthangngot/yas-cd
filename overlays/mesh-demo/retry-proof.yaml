apiVersion: v1
kind: ConfigMap
metadata:
  name: retry-proof-backend-script
  namespace: mesh-demo
data:
  server.py: |
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
    from threading import Lock

    lock = Lock()
    counter = 0

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            global counter
            with lock:
                counter += 1
                attempt = counter

            if attempt % 2 == 1:
                self.send_response(503)
                body = f"retry-proof attempt={attempt} status=503\n"
            else:
                self.send_response(200)
                body = f"retry-proof attempt={attempt} status=200\n"

            self.send_header("Content-Type", "text/plain")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body.encode("utf-8"))

        def log_message(self, fmt, *args):
            print("%s - %s" % (self.address_string(), fmt % args), flush=True)

    ThreadingHTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retry-proof-backend
  namespace: mesh-demo
  labels:
    app.kubernetes.io/name: retry-proof-backend
    app.kubernetes.io/part-of: yas-mesh-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: retry-proof-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: retry-proof-backend
        app.kubernetes.io/part-of: yas-mesh-demo
    spec:
      containers:
        - name: backend
          image: python:3.12-alpine
          command:
            - python
            - /app/server.py
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: backend-script
              mountPath: /app/server.py
              subPath: server.py
      volumes:
        - name: backend-script
          configMap:
            name: retry-proof-backend-script
---
apiVersion: v1
kind: Service
metadata:
  name: retry-proof-backend
  namespace: mesh-demo
  labels:
    app.kubernetes.io/name: retry-proof-backend
    app.kubernetes.io/part-of: yas-mesh-demo
spec:
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    app.kubernetes.io/name: retry-proof-backend
---
apiVersion: v1
kind: Service
metadata:
  name: retry-proof-direct
  namespace: mesh-demo
  labels:
    app.kubernetes.io/name: retry-proof-direct
    app.kubernetes.io/part-of: yas-mesh-demo
spec:
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    app.kubernetes.io/name: retry-proof-backend
---
apiVersion: v1
kind: Service
metadata:
  name: retry-proof
  namespace: mesh-demo
  labels:
    app.kubernetes.io/name: retry-proof
    app.kubernetes.io/part-of: yas-mesh-demo
spec:
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    app.kubernetes.io/name: retry-proof-backend
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: retry-proof-direct
  namespace: mesh-demo
spec:
  hosts:
    - retry-proof-direct
    - retry-proof-direct.mesh-demo.svc.cluster.local
  http:
    - route:
        - destination:
            host: retry-proof-backend.mesh-demo.svc.cluster.local
            port:
              number: 80
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: retry-proof
  namespace: mesh-demo
spec:
  hosts:
    - retry-proof
    - retry-proof.mesh-demo.svc.cluster.local
  http:
    - route:
        - destination:
            host: retry-proof-backend.mesh-demo.svc.cluster.local
            port:
              number: 80
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: "5xx,connect-failure,refused-stream"
