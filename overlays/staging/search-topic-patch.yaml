apiVersion: apps/v1
kind: Deployment
metadata:
  name: search
spec:
  template:
    spec:
      containers:
        - name: search
          env:
            # Must match topic.prefix in operations/debezium-connector-register/staging.
            # Env-specific to keep dev/staging CDC events from mixing in the
            # same Elasticsearch-backed search index.
            - name: PRODUCT_TOPIC_NAME
              value: staging_dbproduct.public.product
