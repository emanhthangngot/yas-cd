apiVersion: apps/v1
kind: Deployment
metadata:
  name: search
spec:
  template:
    spec:
      containers:
        - name: search
          env:
            # Must match topic.prefix in operations/debezium-connector-register/staging.
            # Env-specific to keep dev/staging CDC events from mixing in the
            # same Elasticsearch-backed search index.
            - name: PRODUCT_TOPIC_NAME
              value: staging_dbproduct.public.product
            # Env-specific Elasticsearch index and Kafka consumer group id
            # (both were hardcoded pre-yas#70), so dev and staging no longer
            # overwrite each other's documents or share one consumer group.
            - name: PRODUCT_INDEX_NAME
              value: staging_product
            - name: PRODUCT_CONSUMER_GROUP_ID
              value: staging-product-sync-search
