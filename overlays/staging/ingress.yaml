apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yas-storefront
spec:
  ingressClassName: nginx
  rules:
    - host: yas.staging.local
      http:
        paths:
          - path: /swagger-ui
            pathType: Prefix
            backend:
              service:
                name: swagger-ui
                port:
                  number: 8080
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: storefront-bff
                port:
                  number: 80
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: storefront-bff
                port:
                  number: 80
          - path: /login
            pathType: Prefix
            backend:
              service:
                name: storefront-bff
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: storefront-ui
                port:
                  number: 3000
