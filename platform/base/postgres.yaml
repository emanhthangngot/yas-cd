apiVersion: v1
kind: Secret
metadata:
  name: postgresql-credentials
  namespace: postgres
type: Opaque
stringData:
  POSTGRES_USER: lab-postgres-user
  POSTGRES_PASSWORD: lab-postgres-password
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-initdb
  namespace: postgres
data:
  00-create-yas-databases.sql: |
    CREATE DATABASE cart;
    CREATE DATABASE customer;
    CREATE DATABASE inventory;
    CREATE DATABASE keycloak;
    CREATE DATABASE location;
    CREATE DATABASE media;
    CREATE DATABASE "order";
    CREATE DATABASE payment;
    CREATE DATABASE "payment-paypal";
    CREATE DATABASE product;
    CREATE DATABASE promotion;
    CREATE DATABASE rating;
    CREATE DATABASE search;
    CREATE DATABASE tax;
    CREATE DATABASE recommendation;
    CREATE DATABASE webhook;
    CREATE DATABASE sampledata;
    CREATE DATABASE grafana;
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: postgres
spec:
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
  selector:
    app.kubernetes.io/name: postgresql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: postgres
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql
    spec:
      containers:
        - name: postgresql
          image: pgvector/pgvector:pg15
          imagePullPolicy: IfNotPresent
          args:
            - -c
            - max_connections=500
          ports:
            - name: postgresql
              containerPort: 5432
          envFrom:
            - secretRef:
                name: postgresql-credentials
          env:
            - name: POSTGRES_DB
              value: postgres
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - lab-postgres-user
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - lab-postgres-user
            periodSeconds: 20
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: initdb
          configMap:
            name: postgresql-initdb
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
