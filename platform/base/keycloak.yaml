apiVersion: v1
kind: Secret
metadata:
  name: keycloak-credentials
  namespace: keycloak
type: Opaque
stringData:
  KEYCLOAK_ADMIN: admin
  KEYCLOAK_ADMIN_PASSWORD: admin
  KC_DB_USERNAME: lab-postgres-user
  KC_DB_PASSWORD: lab-postgres-password
---
apiVersion: v1
kind: Service
metadata:
  name: identity
  namespace: keycloak
spec:
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    app.kubernetes.io/name: keycloak
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.0.2
          imagePullPolicy: IfNotPresent
          args:
            - start-dev
            - --http-port=80
            - --hostname-strict=false
            - --import-realm
          ports:
            - name: http
              containerPort: 80
          envFrom:
            - secretRef:
                name: keycloak-credentials
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL_HOST
              value: postgresql.postgres
            - name: KC_DB_URL_PORT
              value: "5432"
            - name: KC_DB_URL_DATABASE
              value: keycloak
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_PROXY_HEADERS
              value: forwarded
          readinessProbe:
            httpGet:
              path: /realms/Yas/.well-known/openid-configuration
              port: http
            periodSeconds: 10
            failureThreshold: 30
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: 1500m
              memory: 2Gi
          volumeMounts:
            - name: realm
              mountPath: /opt/keycloak/data/import
      volumes:
        - name: realm
          configMap:
            name: yas-keycloak-realm
