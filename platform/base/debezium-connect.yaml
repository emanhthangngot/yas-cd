apiVersion: v1
kind: Service
metadata:
  name: debezium-connect
  namespace: kafka
spec:
  ports:
    - name: rest
      port: 8083
      targetPort: rest
  selector:
    app.kubernetes.io/name: debezium-connect
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: debezium-connect
  namespace: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: debezium-connect
  template:
    metadata:
      labels:
        app.kubernetes.io/name: debezium-connect
    spec:
      containers:
        - name: debezium-connect
          image: debezium/connect:2.7.3.Final
          imagePullPolicy: IfNotPresent
          ports:
            - name: rest
              containerPort: 8083
          env:
            - name: BOOTSTRAP_SERVERS
              value: kafka-cluster-kafka-brokers.kafka:9092
            - name: GROUP_ID
              value: "1"
            - name: CONFIG_STORAGE_TOPIC
              value: kafka_connect_configs
            - name: OFFSET_STORAGE_TOPIC
              value: kafka_connect_offsets
            - name: STATUS_STORAGE_TOPIC
              value: kafka_connect_statuses
            # Single-broker Kafka cluster: the default replication factor of
            # 3 for Connect's internal topics would leave them permanently
            # under-replicated and failing to create.
            - name: CONFIG_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: OFFSET_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: STATUS_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_HEAP_OPTS
              value: -Xms256m -Xmx512m
          readinessProbe:
            httpGet:
              path: /connectors
              port: rest
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /connectors
              port: rest
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 6
          resources:
            requests:
              cpu: 150m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 768Mi
