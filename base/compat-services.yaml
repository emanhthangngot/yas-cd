# Compatibility ClusterIP Services for legacy BFF jar gateway routes.
# The storefront-bff jar bundles an application.yaml with routes pointing to
# "nginx" (API gateway) and "storefront-nextjs" (UI) hostnames from the original
# docker-compose dev environment. These Services make those names resolvable
# within the namespace, redirecting DNS to the correct pods.
apiVersion: v1
kind: Service
metadata:
  name: nginx
  labels:
    app.kubernetes.io/part-of: yas
    yas.nashtechglobal.com/component: compat-alias
spec:
  selector:
    app.kubernetes.io/name: storefront-bff
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: storefront-nextjs
  labels:
    app.kubernetes.io/part-of: yas
    yas.nashtechglobal.com/component: compat-alias
spec:
  selector:
    app.kubernetes.io/name: storefront-ui
  ports:
    - name: http
      port: 3000
      targetPort: 3000
