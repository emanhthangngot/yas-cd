apiVersion: v1
kind: ConfigMap
metadata:
  name: yas-configuration-configmap
  annotations:
    reloader.stakater.com/match: "true"
data:
  application.yaml: |
    server:
      shutdown: graceful
      port: 80
    management:
      server:
        port: 8090
      endpoints:
        web:
          exposure:
            include: prometheus,health
      endpoint:
        health:
          probes:
            enabled: true
    spring:
      security:
        oauth2:
          resourceserver:
            jwt:
              issuer-uri: http://identity/realms/Yas
      datasource:
        username: ${POSTGRESQL_USERNAME}
        password: ${POSTGRESQL_PASSWORD}
        hikari:
          maximum-pool-size: 2
          minimum-idle: 0
      kafka:
        bootstrap-servers: kafka-cluster-kafka-brokers.kafka:9092
    springdoc:
      oauthflow:
        authorization-url: http://identity/realms/Yas/protocol/openid-connect/auth
        token-url: http://identity/realms/Yas/protocol/openid-connect/token
    yas:
      public:
        url: http://storefront-ui:3000
      services:
        cart: http://cart/cart
        customer: http://customer/customer
        inventory: http://inventory/inventory
        location: http://location/location
        media: http://media/media
        order: http://order/order
        payment: http://payment/payment
        payment-paypal: http://payment-paypal/payment-paypal
        product: http://product/product
        promotion: http://promotion/promotion
        rating: http://rating/rating
        search: http://search/search
        tax: http://tax/tax
        sampledata: http://sampledata/sampledata
        recommendation: http://recommendation/recommendation
  logback.xml: |
    <configuration>
      <appender name="STDOUT" class="ch.qos.logback.core.ConsoleAppender">
        <encoder>
          <pattern>%d %-5level [%thread] %logger{36} - %msg%n</pattern>
        </encoder>
      </appender>
      <root level="INFO">
        <appender-ref ref="STDOUT" />
      </root>
    </configuration>
---
apiVersion: v1
kind: Secret
metadata:
  name: yas-postgresql-credentials-secret
  annotations:
    reloader.stakater.com/match: "true"
type: Opaque
stringData:
  POSTGRESQL_USERNAME: lab-postgres-user
  POSTGRESQL_PASSWORD: lab-postgres-password
---
apiVersion: v1
kind: Secret
metadata:
  name: yas-elasticsearch-credentials-secret
  annotations:
    reloader.stakater.com/match: "true"
type: Opaque
stringData:
  ELASTICSEARCH_USERNAME: lab-elasticsearch-user
  ELASTICSEARCH_PASSWORD: lab-elasticsearch-password
---
apiVersion: v1
kind: Secret
metadata:
  name: yas-keycloak-credentials-secret
  annotations:
    reloader.stakater.com/match: "true"
type: Opaque
stringData:
  KEYCLOAK_BACKOFFICE_BFF_CLIENT_SECRET: lab-backoffice-bff-client-secret
  KEYCLOAK_STOREFRONT_BFF_CLIENT_SECRET: lab-storefront-bff-client-secret
  KEYCLOAK_CUSTOMER_MANAGEMENT_CLIENT_SECRET: lab-customer-management-client-secret
