apiVersion: v1
kind: ConfigMap
metadata:
  name: yas-configuration-configmap
  annotations:
    reloader.stakater.com/match: "true"
data:
  application.yaml: |
    server:
      shutdown: graceful
      port: 80
    management:
      server:
        port: 8090
      endpoints:
        web:
          exposure:
            include: prometheus,health
      endpoint:
        health:
          probes:
            enabled: true
      opentelemetry:
        tracing:
          export:
            otlp:
              endpoint: http://opentelemetry-collector.observability:4318/v1/traces
        metrics:
          export:
            otlp:
              endpoint: http://opentelemetry-collector.observability:4318/v1/metrics
      tracing:
        sampling:
          probability: 1.0
    spring:
      security:
        oauth2:
          resourceserver:
            jwt:
              # Packaged in the app image (product + common-library
              # application.properties): issuer-uri=http://identity/realms/Yas.
              # Spring prioritizes issuer-uri over jwk-set-uri when both
              # resolve to a value, so the packaged value must be blanked
              # here for jwk-set-uri below to take effect. A YAML `null`
              # does NOT do this: Boot's YAML loader omits null-valued keys
              # from the property source entirely, so binding falls through
              # to the lower-priority packaged value instead of overriding
              # it. An explicit empty string is a real value at this
              # (higher-priority) source, and Boot's autoconfiguration
              # treats a blank issuer-uri as "not configured" (StringUtils.hasText),
              # which is what actually lets jwk-set-uri take over.
              issuer-uri: ""
              jwk-set-uri: http://identity/realms/Yas/protocol/openid-connect/certs
      datasource:
        username: ${POSTGRESQL_USERNAME}
        password: ${POSTGRESQL_PASSWORD}
        hikari:
          maximum-pool-size: 2
          minimum-idle: 0
      kafka:
        bootstrap-servers: kafka-cluster-kafka-brokers.kafka:9092
    springdoc:
      oauthflow:
        authorization-url: http://identity/realms/Yas/protocol/openid-connect/auth
        token-url: http://identity/realms/Yas/protocol/openid-connect/token
    yas:
      public:
        url: http://storefront-ui:3000
      services:
        cart: http://cart/cart
        customer: http://customer/customer
        inventory: http://inventory/inventory
        location: http://location/location
        media: http://media/media
        order: http://order/order
        payment: http://payment/payment
        payment-paypal: http://payment-paypal/payment-paypal
        product: http://product/product
        promotion: http://promotion/promotion
        rating: http://rating/rating
        search: http://search/search
        tax: http://tax/tax
        sampledata: http://sampledata/sampledata
        recommendation: http://recommendation/recommendation
  logback.xml: |
    <configuration>
      <appender name="STDOUT" class="ch.qos.logback.core.ConsoleAppender">
        <encoder>
          <pattern>%d %-5level [%thread] %logger{36} - %msg%n</pattern>
        </encoder>
      </appender>
      <root level="INFO">
        <appender-ref ref="STDOUT" />
      </root>
    </configuration>
---
apiVersion: v1
