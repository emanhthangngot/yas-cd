  name: yas-postgresql-credentials-secret
  annotations:
    reloader.stakater.com/match: "true"
type: Opaque
stringData:
  POSTGRESQL_USERNAME: lab-postgres-user
  POSTGRESQL_PASSWORD: lab-postgres-password
---
