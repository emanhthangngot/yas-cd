apiVersion: v1
kind: Secret
metadata:
  name: yas-redis-credentials-secret
  annotations:
    reloader.stakater.com/match: "true"
type: Opaque
stringData:
  REDIS_PASSWORD: lab-redis-password
---
apiVersion: v1
kind: Secret
metadata:
  name: yas-openai-api-key-secret
  annotations:
    reloader.stakater.com/match: "true"
type: Opaque
stringData:
  OPENAI_API_KEY: lab-openai-placeholder
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: customer-application-configmap
data:
  customer-application.yaml: |
    keycloak:
      auth-server-url: http://identity
      realm: Yas
      resource: customer-management
      credentials:
        secret: ${KEYCLOAK_CUSTOMER_MANAGEMENT_CLIENT_SECRET}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: media-application-configmap
data:
  media-application.yaml: |
    server:
      servlet:
        context-path: /media
    yas:
      publicUrl: http://media/media
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-paypal-application-configmap
data:
  payment-paypal-application.yaml: |
    yas:
      public:
        url: http://storefront-ui:3000/complete-payment
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: search-application-configmap
data:
  search-application.yaml: |
    elasticsearch:
      url: elasticsearch-es-http.elasticsearch
      username: ${ELASTICSEARCH_USERNAME}
      password: ${ELASTICSEARCH_PASSWORD}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: recommendation-application-configmap
data:
  recommendation-application.yaml: |
    spring:
      ai:
        azure:
          openai:
            api-key: ${OPENAI_API_KEY}
            endpoint: https://product-recommendation.openai.azure.com
            embedding:
              options:
                model: text-embedding-3-small
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yas-gateway-routes-config-configmap
data:
  gateway-routes-config.yaml: |
    spring:
      cloud:
        gateway:
          routes:
            - id: product_api
              uri: http://product
              predicates:
                - Path=/api/product/**
              filters:
                - RewritePath=/api/(?<segment>.*), /${segment}
                - TokenRelay=
            - id: cart_api
              uri: http://cart
              predicates:
                - Path=/api/cart/**
              filters:
                - RewritePath=/api/(?<segment>.*), /${segment}
                - TokenRelay=
            - id: customer_api
              uri: http://customer
              predicates:
                - Path=/api/customer/**
              filters:
                - RewritePath=/api/(?<segment>.*), /${segment}
                - TokenRelay=
            - id: order_api
              uri: http://order
              predicates:
                - Path=/api/order/**
              filters:
                - RewritePath=/api/(?<segment>.*), /${segment}
                - TokenRelay=
            - id: ui
              uri: ${UI_HOST}
              predicates:
                - Path=/**
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backoffice-bff-extra-configmap
data:
  backoffice-bff-extra-config.yaml: |
    spring:
      data:
        redis:
          host: redis-master.redis
          password: ${REDIS_PASSWORD}
          port: 6379
      security:
        oauth2:
          client:
            provider:
              keycloak:
                issuer-uri: http://identity/realms/Yas
            registration:
              api-client:
                provider: keycloak
                client-id: backoffice-bff
                client-secret: ${KEYCLOAK_BACKOFFICE_BFF_CLIENT_SECRET}
                scope: openid, profile, email, roles
---
