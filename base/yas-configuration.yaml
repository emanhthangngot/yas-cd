apiVersion: v1
kind: Secret
metadata:
  name: yas-openai-api-key-secret
  annotations:
    reloader.stakater.com/match: "true"
type: Opaque
stringData:
  OPENAI_API_KEY: lab-openai-placeholder
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: customer-application-configmap
data:
  customer-application.yaml: |
    keycloak:
      auth-server-url: http://identity
      realm: Yas
      resource: customer-management
      credentials:
        secret: ${KEYCLOAK_CUSTOMER_MANAGEMENT_CLIENT_SECRET}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: media-application-configmap
data:
  media-application.yaml: |
    server:
      servlet:
        context-path: /media
    yas:
      publicUrl: /api/media
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-paypal-application-configmap
data:
  payment-paypal-application.yaml: |
    yas:
      public:
        url: http://storefront-ui:3000/complete-payment
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: search-application-configmap
data:
  search-application.yaml: |
    elasticsearch:
      url: elasticsearch-es-http.elasticsearch:9200
      username: ${ELASTICSEARCH_USERNAME}
      password: ${ELASTICSEARCH_PASSWORD}
    spring:
      kafka:
        consumer:
          bootstrap-servers: kafka-cluster-kafka-brokers.kafka:9092
        producer:
          bootstrap-servers: kafka-cluster-kafka-brokers.kafka:9092
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: recommendation-application-configmap
data:
  recommendation-application.yaml: |
    spring:
      ai:
        azure:
          openai:
            api-key: ${OPENAI_API_KEY}
            endpoint: https://product-recommendation.openai.azure.com
            embedding:
              options:
                model: text-embedding-3-small
      kafka:
        consumer:
          bootstrap-servers: kafka-cluster-kafka-brokers.kafka:9092
        producer:
          bootstrap-servers: kafka-cluster-kafka-brokers.kafka:9092
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yas-gateway-routes-config-configmap
data:
  gateway-routes-config.yaml: |
    spring:
      cloud:
        gateway:
          server:
            webflux:
              routes:
                - id: cart_api
                  uri: http://cart
                  order: -10
                  predicates:
                    - Path=/api/cart/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: customer_api
                  uri: http://customer
                  order: -10
                  predicates:
                    - Path=/api/customer/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: inventory_api
                  uri: http://inventory
                  order: -10
                  predicates:
                    - Path=/api/inventory/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: location_api
                  uri: http://location
                  order: -10
                  predicates:
                    - Path=/api/location/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: media_api
                  uri: http://media
                  order: -10
                  predicates:
                    - Path=/api/media/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: order_api
                  uri: http://order
                  order: -10
                  predicates:
                    - Path=/api/order/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: payment_api
                  uri: http://payment
                  order: -10
                  predicates:
                    - Path=/api/payment/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: payment_paypal_api
                  uri: http://payment-paypal
                  order: -10
                  predicates:
                    - Path=/api/payment-paypal/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: product_api
                  uri: http://product
                  order: -10
                  predicates:
                    - Path=/api/product/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: promotion_api
                  uri: http://promotion
                  order: -10
                  predicates:
                    - Path=/api/promotion/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: rating_api
                  uri: http://rating
                  order: -10
                  predicates:
                    - Path=/api/rating/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: search_api
                  uri: http://search
                  order: -10
                  predicates:
                    - Path=/api/search/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: tax_api
                  uri: http://tax
                  order: -10
                  predicates:
                    - Path=/api/tax/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: webhook_api
                  uri: http://webhook
                  order: -10
                  predicates:
                    - Path=/api/webhook/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: sampledata_api
                  uri: http://sampledata
                  order: -10
                  predicates:
                    - Path=/api/sampledata/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: recommendation_api
                  uri: http://recommendation
                  order: -10
                  predicates:
                    - Path=/api/recommendation/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: ui
                  uri: ${UI_HOST}
                  order: -10
                  predicates:
                    - Path=/**
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backoffice-bff-extra-configmap
data:
  backoffice-bff-extra-config.yaml: |
    logging:
      level:
        org.springframework.security: DEBUG
    spring:
      data:
        redis:
          host: redis-master.redis
          password: ${REDIS_PASSWORD}
          port: 6379
      security:
        oauth2:
          client:
            provider:
              keycloak:
                issuer-uri: http://identity/realms/Yas
            registration:
              api-client:
                provider: keycloak
                client-id: backoffice-bff
                client-secret: ${KEYCLOAK_BACKOFFICE_BFF_CLIENT_SECRET}
                scope: openid, profile, email, roles
---
apiVersion: v1
kind: ConfigMap
metadata:
