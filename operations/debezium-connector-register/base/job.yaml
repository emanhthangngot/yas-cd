apiVersion: batch/v1
kind: Job
metadata:
  name: debezium-product-connector-register
  labels:
    app.kubernetes.io/name: debezium-connect
    app.kubernetes.io/component: connector-register-job
    app.kubernetes.io/part-of: yas
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: debezium-connect
        app.kubernetes.io/component: connector-register-job
        app.kubernetes.io/part-of: yas
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: Never
      containers:
        - name: register
          image: curlimages/curl:8.11.1
          env:
            - name: CONNECTOR_NAME
              value: product-connector
            - name: DB_NAME
              value: product
            - name: TOPIC_PREFIX
              value: dbproduct
            - name: SLOT_NAME
              value: product_slot
            - name: PUBLICATION_NAME
              value: product_publication
          envFrom:
            - secretRef:
                name: yas-postgresql-credentials-secret
          command:
            - sh
            - -ec
          args:
            - |
              echo "waiting for debezium-connect REST API..."
              until curl -sf "http://debezium-connect.kafka:8083/connectors" >/dev/null; do
                sleep 5
              done
              echo "debezium-connect is ready"

              cat > /tmp/connector.json <<EOF
              {
                "connector.class": "io.debezium.connector.postgresql.PostgresConnector",
                "database.hostname": "postgresql.postgres",
                "database.port": "5432",
                "database.user": "${POSTGRESQL_USERNAME}",
                "database.password": "${POSTGRESQL_PASSWORD}",
                "database.dbname": "${DB_NAME}",
                "topic.prefix": "${TOPIC_PREFIX}",
                "schema.include.list": "public",
                "table.include.list": "public.product",
                "plugin.name": "pgoutput",
                "slot.name": "${SLOT_NAME}",
                "publication.name": "${PUBLICATION_NAME}",
                "publication.autocreate.mode": "filtered",
                "key.converter": "org.apache.kafka.connect.json.JsonConverter",
                "value.converter": "org.apache.kafka.connect.json.JsonConverter",
                "key.converter.schemas.enable": "false",
                "value.converter.schemas.enable": "false"
              }
              EOF

              status="$(curl -s -o /tmp/response.json -w '%{http_code}' \
                -X PUT -H 'Content-Type: application/json' \
                --data-binary @/tmp/connector.json \
                "http://debezium-connect.kafka:8083/connectors/${CONNECTOR_NAME}/config")"

              echo "PUT /connectors/${CONNECTOR_NAME}/config -> HTTP ${status}"
              cat /tmp/response.json
              echo

              case "$status" in
                200|201) exit 0 ;;
                *) echo "connector registration failed" >&2; exit 1 ;;
              esac
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
