apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: staging
resources:
  - ../base
labels:
  - pairs:
      app.kubernetes.io/part-of: yas
      yas.nashtechglobal.com/environment: staging
    includeSelectors: true
images:
  - name: docker.io/emanhthangngot/yas-sampledata
    newTag: v0.0.0
patches:
  - path: env-patch.yaml
    target:
      kind: Job
      name: sampledata-seed-once
