name: Validate GitOps

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Install kustomize
        run: |
          # Pinned direct download: install_kustomize.sh queries the GitHub API
          # anonymously and gets rate-limited on shared runners.
          KUSTOMIZE_VERSION=v5.8.1
          curl -fsSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" | tar -xz kustomize
          sudo mv kustomize /usr/local/bin/kustomize
          kustomize version

      - name: Validate GitOps render and policy
        run: scripts/validate-gitops.sh

      - name: Validate staging immutable tags
        run: scripts/validate-staging-immutable.sh

      - name: Check whitespace errors
        run: git diff --check
