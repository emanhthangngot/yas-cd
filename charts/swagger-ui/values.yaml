# Default values for swagger-ui.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: swaggerapi/swagger-ui
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "v4.16.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Keep relative URLs (no hard-coded host): swagger-ui is now reachable at
# multiple per-app hostnames (swagger.<env>.yas.local.com), and only
# `/` + `/api` are routed for those hosts (see overlays/*/ingress.yaml).
# A relative path resolves against whichever host served this page, so it
# works the same everywhere without per-env templating.
# Only services.yaml deploy:true backends are listed (rating/promotion are
# deploy:false -- not running in this cluster, so their docs 404 regardless
# of URL style).
#
# baseUrl is "/" (not "/swagger-ui"): that path prefix was needed back when
# swagger-ui shared one host with storefront/backoffice-ui, so the PATH had
# to disambiguate it. It now has its own dedicated host
# (swagger.<env>.yas.local.com), so the host alone already disambiguates it
# and the extra path segment was just leftover cruft.
baseUrl: /
urls: "[{ url: '/api/product/v3/api-docs', name: 'Product' },
      { url: '/api/media/v3/api-docs', name: 'Media' },
      { url: '/api/customer/v3/api-docs', name: 'Customer' },
      { url: '/api/cart/v3/api-docs', name: 'Cart'},
      { url: '/api/order/v3/api-docs', name: 'Order'},
      { url: '/api/payment/v3/api-docs', name: 'Payment'},
      { url: '/api/location/v3/api-docs', name: 'Location'},
      { url: '/api/inventory/v3/api-docs', name: 'Inventory'},
      { url: '/api/tax/v3/api-docs', name: 'Tax' },
      { url: '/api/search/v3/api-docs', name: 'Search'}]"

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: "nginx"
  host: api.yas.local.com
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: api.yas.local.com
      paths:
        - path: /swagger-ui
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
